name: Publish to PyPI and TestPyPI

on:
  push:
    tags:
      - "v*.*.*" # Trigger automatically when a version tag is pushed (e.g. v0.1.4)
  workflow_dispatch: # Allow manual triggering from the GitHub Actions UI

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build a binary wheel and a source tarball using uv
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/django-basic-form-builder
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing (OIDC)
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/') # Ensure it only publishes to real PyPI if a tag triggered it
    needs:
      - publish-to-testpypi # Wait for TestPyPI publish to succeed first
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/django-basic-form-builder
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing (OIDC)
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
